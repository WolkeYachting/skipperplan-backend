<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Skipperplan</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{--bg:#0a1628;--surface:#111f38;--card:#162640;--border:#1e3354;--accent:#3b82f6;--accent2:#06b6d4;--text:#e2eaf8;--muted:#5a7399;--success:#22c55e;--warning:#f59e0b;--danger:#ef4444;--radius:12px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
  .app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:24px 16px 40px}
  .header{display:flex;align-items:center;gap:14px;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border)}
  .logo{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:grid;place-items:center;font-size:22px;flex-shrink:0;box-shadow:0 0 20px rgba(59,130,246,.3)}
  .header-text h1{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.3px;line-height:1}
  .header-text p{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.5px;text-transform:uppercase}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;animation:fadeUp .3s ease both}
  .card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .card-title span{color:var(--accent);font-size:16px}
  .btn{width:100%;padding:13px;border:none;border-radius:9px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent}
  .btn-primary{background:linear-gradient(135deg,var(--accent),#2563eb);color:#fff;box-shadow:0 4px 14px rgba(59,130,246,.35)}
  .btn-primary:active{transform:scale(.97);box-shadow:none}
  .btn-success{background:linear-gradient(135deg,var(--success),#16a34a);color:#fff;box-shadow:0 4px 14px rgba(34,197,94,.3);margin-bottom:8px}
  .btn-success:active{transform:scale(.97)}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:12px;padding:9px}
  .btn-outline:active{background:var(--surface)}
  .steps{display:flex;gap:6px;margin-bottom:24px}
  .step{flex:1;height:3px;border-radius:2px;background:var(--border);transition:background .4s}
  .step.active{background:var(--accent)}
  .step.done{background:var(--success)}
  .log{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:11px;line-height:1.7;max-height:220px;overflow-y:auto;margin-top:14px}
  .log-line{display:flex;gap:8px}
  .log-line.ok .icon{color:var(--success)}
  .log-line.err .icon{color:var(--danger)}
  .log-line.info .icon{color:var(--accent)}
  .log-text{color:var(--text);word-break:break-all}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
  .stat-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--accent);line-height:1}
  .stat-label{font-size:10px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
  .hidden{display:none!important}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .card:nth-child(2){animation-delay:.05s}
  .card:nth-child(3){animation-delay:.1s}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">⛵</div>
    <div class="header-text">
      <h1>Skipperplan</h1>
      <p>join-the-crew · Excel Export</p>
    </div>
  </div>
  <div class="steps">
    <div class="step active" id="s1"></div>
    <div class="step" id="s2"></div>
    <div class="step" id="s3"></div>
  </div>
  <div class="card" id="cardStart">
    <div class="card-title"><span>⛵</span> Skipperplan abrufen</div>
    <p style="font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:16px">
      Lädt automatisch alle aktuellen Törns und erstellt eine fertige Excel-Datei mit Skipper-Auswertung.
    </p>
    <button class="btn btn-primary" onclick="startFetch()">
      Jetzt starten
    </button>
  </div>
  <div class="card hidden" id="cardLoad">
    <div class="card-title"><span>📡</span> Daten werden geladen</div>
    <div class="log" id="log"></div>
    <div class="stats hidden" id="stats">
      <div class="stat"><div class="stat-val" id="statTermine">—</div><div class="stat-label">Termine</div></div>
      <div class="stat"><div class="stat-val" id="statYachten">—</div><div class="stat-label">Yachten</div></div>
    </div>
  </div>
  <div class="card hidden" id="cardDone">
    <div class="card-title"><span>✅</span> Fertig</div>
    <button class="btn btn-success" onclick="downloadExcel()">⬇ Excel herunterladen</button>
    <button class="btn btn-outline" onclick="resetApp()">Neu starten</button>
  </div>
</div>
<script>
// ── Backend-URL hier eintragen, sobald Render deployed ist ────────────────────
const BACKEND_URL = 'https://skipperplan-backend.onrender.com';

const ALGOLIA_HOST='https://m6n4q601zw-dsn.algolia.net',ALGOLIA_APP_ID='M6N4Q601ZW',ALGOLIA_INDEX='prod_trip_dates_skipperplan_de',HITS_PER_PAGE=100;
const STAMMSKIPPER={6429:'Julian S',13707:'Miriam M',2430:'Gregor K',13035:'Nicole M',951:'Martin S',14111:'Leon H',17277:'David H',28325:'Adam B',7022:'Mareike W',20147:'Yanik K',6896:'Malte W',9724:'Luke W',6758:'Marc L',347:'Mario L',9375:'Clemens P'};
const COLUMN_ORDER=['Startdatum','Enddatum','Reisename','Typ','Tage','Altersgruppe','Skipper','ID Skipper','Plätze gesamt','Plätze belegt','Saison','Preisspanne (€)','Land','Kontinent','Anbieter','Trip ID','Trip Date ID','Yacht ID','Yachtmodell','Yachtname','Bootstyp','Baujahr','Yacht Status','Skipper Status','Flotillenführer','Bewerbungen'];
const SK_LABELS={'confirmed_by_admin_and_skipper':'Bestätigt','confirmed_by_admin':'Vom Admin bestätigt','assigned':'Zugeteilt (offen)'};

function log(msg,type='info'){const icons={ok:'✓',err:'✗',info:'·'};const el=document.getElementById('log');el.innerHTML+=`<div class="log-line ${type}"><span class="icon">${icons[type]||'·'}</span><span class="log-text">${msg}</span></div>`;el.scrollTop=el.scrollHeight}
function setStep(n){[1,2,3].forEach(i=>{const el=document.getElementById('s'+i);el.className='step'+(i<n?' done':i===n?' active':'')})}
function tsToDate(ts){if(!ts)return'';return new Date(ts*1000).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})}
function first(a,d=''){return a&&a.length?a[0]:d}
function parseDays(s){const m=String(s||'').match(/(\d+)/);return m?parseInt(m[1]):7}
function daysToWeeks(d){return Math.round(d/7)}

async function getAlgoliaKey(){
  const resp=await fetch(`${BACKEND_URL}/algolia-key`);
  if(!resp.ok)throw new Error(`Backend HTTP ${resp.status}`);
  const data=await resp.json();
  if(data.error)throw new Error(data.error);
  return data.key;
}

async function fetchAlgolia(apiKey){
  let page=0,total=null;const hits=[];
  while(true){
    const resp=await fetch(`${ALGOLIA_HOST}/1/indexes/*/queries`,{method:'POST',headers:{'x-algolia-application-id':ALGOLIA_APP_ID,'x-algolia-api-key':apiKey,'Content-Type':'application/json'},body:JSON.stringify({requests:[{indexName:ALGOLIA_INDEX,params:`hitsPerPage=${HITS_PER_PAGE}&page=${page}&query=`}]})});
    if(resp.status===403)throw new Error('Algolia-Key ungültig (403)');
    if(!resp.ok)throw new Error(`Algolia HTTP ${resp.status}`);
    const data=await resp.json();const result=data.results[0];const batch=result.hits||[];
    hits.push(...batch);if(total===null)total=result.nbHits||0;
    log(`Seite ${page+1}: ${batch.length} Treffer (${hits.length}/${total})`);
    document.getElementById('statTermine').textContent=hits.length;
    if(hits.length>=total||batch.length<HITS_PER_PAGE)break;
    page++;
  }
  return hits;
}

function dedup(hits){const s=new Set();return hits.filter(h=>{const id=h.trip_date_id||h.objectID;if(s.has(id))return false;s.add(id);return true})}

function extractRows(hits){
  const rows=[];
  for(const h of hits){
    const dest=h.trip_destination||{};
    const proposals=(h.yacht_skipper_proposals||[]).map(p=>p.name).filter(Boolean);
    const ti={'Startdatum':tsToDate(h.start_date_min||first(h.start_date||[])),'Enddatum':tsToDate(first(h.end_date||[])),'Reisename':dest.name||'','Typ':h.type||'','Tage':first(h.trip_days||[]),'Altersgruppe':first(h.age_range||[]),'Saison':first(h.season||[]),'Preisspanne (€)':first(h.price_range||[]),'Land':dest.country||'','Kontinent':dest.continent||'','Anbieter':h.vendor||'','Trip ID':h.trip_id||'','Trip Date ID':h.trip_date_id||''};
    (h.yachts||[]).forEach((y,i)=>{
      const sk=y.skipper||{},ss=sk.status||'',sn=sk.name||'',ys=y.status||'';
      let rc=null;
      if(ys==='should_be_canceled')rc='cancel';else if(!sn)rc='no_skipper';else if(ss==='assigned')rc='unconfirmed';
      rows.push({...ti,'Skipper':sn||'⚠ Kein Skipper','ID Skipper':sk.id||'','Plätze gesamt':y.places||'','Plätze belegt':y.occupied_places||'','Yacht ID':y.id||'','Yachtmodell':y.accomodation_details_name||'','Yachtname':y.yacht_name||'','Bootstyp':y.accomodation_details_type||'','Baujahr':y.yacht_year||'','Yacht Status':ys==='should_be_canceled'?'Zu stornieren':'Bestätigt','Skipper Status':SK_LABELS[ss]||ss||'—','Flotillenführer':sk.is_flotilla_leader?'Ja':'Nein','Bewerbungen':i===0?proposals.join(', '):'','_color':rc});
    });
  }
  return rows;
}

function buildSkipperData(hits){
  const map={};
  for(const h of hits){
    const weeks=daysToWeeks(parseDays(first(h.trip_days||[])));
    const summer=(first(h.season||'')||'').toLowerCase()==='summer';
    for(const y of(h.yachts||[])){const sk=y.skipper||{};if(!sk.id||!sk.name)continue;if(!map[sk.id])map[sk.id]={name:sk.name,törns:0,totalWeeks:0,summerWeeks:0};map[sk.id].törns++;map[sk.id].totalWeeks+=weeks;if(summer)map[sk.id].summerWeeks+=weeks;}
  }
  return Object.entries(map).sort((a,b)=>b[1].törns-a[1].törns).map(([id,d])=>({id:parseInt(id),...d,status:STAMMSKIPPER[id]?'Stammskipper':d.summerWeeks>5?'Advanced':'Hobby'}));
}

function cs(bg,bold=false,center=false){return{font:{name:'Arial',sz:bold?11:10,bold,color:{rgb:bold?'FFFFFF':'000000'}},fill:{fgColor:{rgb:bg},patternType:'solid'},alignment:{horizontal:center?'center':'left',vertical:'center',wrapText:bold},border:{top:{style:'thin',color:{rgb:'BFBFBF'}},bottom:{style:'thin',color:{rgb:'BFBFBF'}},left:{style:'thin',color:{rgb:'BFBFBF'}},right:{style:'thin',color:{rgb:'BFBFBF'}}}}}

function buildExcel(rows,skipperData){
  const wb=XLSX.utils.book_new();
  const widths={Startdatum:12,Enddatum:12,Reisename:28,Typ:10,Tage:7,Altersgruppe:13,Skipper:20,'ID Skipper':10,'Plätze gesamt':14,'Plätze belegt':14,Saison:9,'Preisspanne (€)':15,Land:12,Kontinent:11,Anbieter:10,'Trip ID':9,'Trip Date ID':13,'Yacht ID':10,Yachtmodell:22,Yachtname:18,Bootstyp:12,Baujahr:9,'Yacht Status':15,'Skipper Status':22,Flotillenführer:15,Bewerbungen:40};
  const cm={cancel:'FFCCCC',no_skipper:'B4F7B4',unconfirmed:'FCE4D6'};
  const wsData=[COLUMN_ORDER,...rows.map(r=>COLUMN_ORDER.map(c=>r[c]??''))];
  const ws=XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols']=COLUMN_ORDER.map(c=>({wch:widths[c]||14}));
  COLUMN_ORDER.forEach((_,ci)=>{const a=XLSX.utils.encode_cell({r:0,c:ci});if(!ws[a])ws[a]={v:COLUMN_ORDER[ci]};ws[a].s=cs('1F4E79',true,true)});
  rows.forEach((row,ri)=>{const bg=cm[row._color]||(ri%2===0?'D6E4F0':'FFFFFF');COLUMN_ORDER.forEach((_,ci)=>{const a=XLSX.utils.encode_cell({r:ri+1,c:ci});if(!ws[a])ws[a]={v:''};ws[a].s=cs(bg)})});
  XLSX.utils.book_append_sheet(wb,ws,'Segelreisen');
  const sh=['Skipper','ID','Törns','Wochen','Status'];
  const sc={Stammskipper:'C6EFCE',Advanced:'FFEB9C',Hobby:'FFFFFF'};
  const ws2=XLSX.utils.aoa_to_sheet([sh,...skipperData.map(d=>[d.name,d.id,d.törns,d.totalWeeks,d.status])]);
  ws2['!cols']=[{wch:24},{wch:10},{wch:8},{wch:9},{wch:16}];
  sh.forEach((_,ci)=>{const a=XLSX.utils.encode_cell({r:0,c:ci});if(!ws2[a])ws2[a]={v:sh[ci]};ws2[a].s=cs('1F4E79',true,true)});
  skipperData.forEach((d,ri)=>{[d.name,d.id,d.törns,d.totalWeeks,d.status].forEach((val,ci)=>{const a=XLSX.utils.encode_cell({r:ri+1,c:ci});if(!ws2[a])ws2[a]={v:val};ws2[a].s=cs(ci===4?sc[d.status]||'FFFFFF':ri%2===0?'D6E4F0':'FFFFFF',false,ci>=2&&ci<4)})});
  XLSX.utils.book_append_sheet(wb,ws2,'Skipper');
  return wb;
}

async function startFetch(){
  document.getElementById('cardStart').classList.add('hidden');
  document.getElementById('cardLoad').classList.remove('hidden');
  document.getElementById('stats').classList.remove('hidden');
  setStep(2);
  try{
    log('Hole Algolia-Key vom Backend …');
    const apiKey=await getAlgoliaKey();
    log('Key erhalten, lade Daten …','ok');
    let hits=await fetchAlgolia(apiKey);
    log(`${hits.length} Treffer geladen`,'ok');
    hits=dedup(hits);
    log(`${hits.length} eindeutige Termine`,'ok');
    const rows=extractRows(hits);
    document.getElementById('statTermine').textContent=hits.length;
    document.getElementById('statYachten').textContent=rows.length;
    log(`${rows.length} Yacht-Zeilen extrahiert`,'ok');
    log('Excel wird erstellt …');
    window._wb=buildExcel(rows,buildSkipperData(hits));
    log('Fertig!','ok');
    setStep(3);
    document.getElementById('cardDone').classList.remove('hidden');
  }catch(e){log(`Fehler: ${e.message}`,'err')}
}

function downloadExcel(){
  if(!window._wb)return;
  const d=new Date().toISOString().slice(0,10);
  XLSX.writeFile(window._wb,`skipperplan_${d}.xlsx`);
}

function resetApp(){
  ['cardLoad','cardDone'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  document.getElementById('cardStart').classList.remove('hidden');
  document.getElementById('log').innerHTML='';
  setStep(1);window._wb=null;
}
</script>
</body>
</html>
