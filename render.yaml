services:
  - type: web
    name: skipperplan-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 120
    envVars:
      - key: JTC_USER
        sync: false
      - key: JTC_PASSWORD
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: GITHUB_TOKEN
        sync: false
